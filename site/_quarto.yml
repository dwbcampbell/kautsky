project:
  type: website

website:
  title: "German Marxists in Translation"
  description: >
    Complete, unabridged parallel German/English editions of works of
    German Marxism, newly translated from the Marxists Internet Archive
    transcriptions.
  navbar:
    search: true
    left:
      - text: "Works"
        menu:
          - text: "The Economic Doctrines of Karl Marx (1886)"
            href: oekonomische-lehren/index.qmd
          - text: "The Erfurt Programme (1892)"
            href: erfurter-programm/index.qmd
  search:
    type: overlay
    copy-button: true
    show-item-context: true
  comments:
    hypothesis:
      theme: clean
      openSidebar: false
