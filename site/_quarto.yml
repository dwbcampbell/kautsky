          - chapters/ch1.qmd
          - chapters/ch2.qmd
          - chapters/ch3.qmd
          - chapters/ch4.qmd
          - chapters/ch5.qmd

format:
  html:
    theme: cosmo
    css: assets/parallel.css
    page-layout: full
    toc: true
    toc-depth: 3

lang: en
